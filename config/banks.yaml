# banks.yaml — G-SIB dealer-bank roster (the ISDA benchmarking universe).
#
# Each entry: id, name, jurisdiction (∈ models.Jurisdiction), ir_url, p3dh_lei,
# number_locale, reporting_currency (ISO 4217). Proves "Nth bank = config, not
# code" (CLAUDE.md §A.5). China G-SIBs are intentionally excluded — outside the
# current Jurisdiction enum; add later.
#
# p3dh_lei is null for ALL banks: LEIs are populated later from GLEIF, never
# guessed (data-integrity project — CLAUDE.md §A).
#
# Currency traps are deliberate: HSBC, Standard Chartered and UBS report in USD,
# not their home currency.
#
# ir_url is the bank's main corporate domain, best-effort.
# TODO verify disclosures page  (the exact Pillar 3 / regulatory-disclosure URL
# per bank is resolved by the discovery box, not pinned here).
banks:
  # --- UK ---------------------------------------------------------------------
  - id: hsbc
    name: HSBC Holdings
    jurisdiction: UK
    ir_url: https://www.hsbc.com
    p3dh_lei: null
    number_locale: en_GB
    reporting_currency: USD
