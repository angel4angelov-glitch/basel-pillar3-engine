  # Capital BASIS — read from HSBC's OWN words, NOT assumed from Barclays:
  #  - The table intro states capital is on the "UK Capital Requirements Regulation
  #    end-point basis" (i.e. fully-loaded / no IFRS 9 transitional relief). By 2026
  #    transitional relief has fully run off, so end-point == transitional IN VALUE;
  #    rows 1/2/3 are tagged ecl_basis TRANSITIONAL to match the EBA template row +
  #    config/templates/km1.yaml (the identities pin to that basis). The digit is the
  #    same either way — the tag is the template's axis, the basis read is HSBC's own.
  #  - Footnote 1: "From 30 June 2025, the regulatory valuation of tier 2 capital
  #    includes the associated accrued interest. Prior periods have not been restated."
  #    Affects Total capital (rows 3/7) period-on-period comparability, not the Q1'26
  #    point-in-time digit measured here.
  #  - RWA (4) + capital ratios (5/6/7) carry floor_basis FINAL to match the template
  #    row; UK Basel 3.1 output floor is not yet effective (PRA: 1 Jan 2027), so this
  #    is the standard total RWA — the tag is the EBA row axis, consistent with Barclays.
  # BASIS TRAP (documented, not a bug): the intro states LCR (row 17) is the average of
  # the preceding 12 months and NSFR (row 20) is the average of the preceding four
  # quarter-end values. So their components (rows 15/16, 18/19) are NOT a clean
  # point-in-time numerator/denominator for the disclosed ratio — they must NOT be
  # reconciled into the LCR/NSFR ratio (config/templates/km1.yaml gives them no identity).
  # KM1.7 NOTE (measured miss, deferred-with-reason): HSBC prints rows 3 (amount) and 7
  # (ratio) with the IDENTICAL label "Total capital¹" — the "(%)" sits in a separate
  # "Capital ratios (%)" section-header row, and the row enumerator (3 vs 7) is a
  # separate numeric cell. Exact-label rule + bounded-LLM both key off the row label,
  # which collides; the topmost row (3, the amount) wins and row 7 is dropped before the
  # LLM sees it. KM1.7 is therefore an honest MISS (not extracted), kept in this golden
  # as truth (19.7%). Resolving it needs enumerator/section-aware matching in src — a
  # change held for sign-off, NOT silently built (CLAUDE.md §A scope guardrail).

