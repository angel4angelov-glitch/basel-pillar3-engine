  # Basis of the headline rows (two-pass check, SCHEMA.md):
  #  - Capital rows 1/2/3 are the transitional (headline) own-funds lines; by 2026
  #    IFRS 9 transitional relief has fully run off, so transitional == fully-loaded
  #    in value, but we tag TRANSITIONAL to match the EBA row + config/templates/km1.yaml.
  #  - RWA (4) + capital ratios (5/6/7) are post-output-floor => floor_basis FINAL.
  #  - Leverage / LCR / NSFR rows carry neither axis => NA/NA.
  # BASIS TRAP (documented, not a bug): footnote 3 states the LCR ratio (row 17) is
  # the average of the last 12 spot month-end ratios, and footnote 4 states the NSFR
  # ratio (row 20) is the average of the last four spot quarter-end ratios. Their
  # components (rows 15/16, 18/19) are NOT a clean point-in-time numerator/denominator
  # for the disclosed ratio, so HQLA/outflows and ASF/RSF must NOT be reconciled into
  # the LCR/NSFR ratio (would FAIL on methodology, not on a misread). Captured here
  # for digit-fidelity measurement only.

